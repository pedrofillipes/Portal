<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Registro de Encomendas</title>
  <link rel="stylesheet" href="css/vars.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .modal-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 999;
    }
    .modal-content {
      background: white;
      padding: 1rem;
      border-radius: 12px;
      max-width: 860px;
      width: 95%;
      height: 90%;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 20px rgba(0,0,0,0.2);
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: var(--font-2);
      border-bottom: 1px solid #ccc;
      padding-bottom: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .modal-header h2 {
      font-size: 1.2rem;
      margin: 0;
    }
    .modal-header button {
      background: var(--cor-3);
      color: white;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
    }
    .modal-header button:hover {
      background: var(--cor-4);
    }
    .modal-content form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      flex: 1;
    }
    .modal-content form label {
      display: flex;
      flex-direction: column;
      font-weight: 600;
    }
    .modal-content form input, .modal-content form textarea {
      padding: 0.5rem;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-family: var(--font);
    }
    .modal-content form button[type="submit"] {
      background: var(--cor-3);
      color: white;
      font-weight: bold;
      border: none;
      padding: 0.75rem;
      border-radius: 6px;
      cursor: pointer;
    }
    .modal-content form button[type="submit"]:hover {
      background: var(--cor-4);
    }
  </style>
</head>
<body class="layout">
  <aside class="sidebar">
    <h2>Menu</h2>
    <nav>
      <ul>
        <li><a href="index.html">Início</a></li>
        <li><a href="folhas.html">Folhas de Assinatura</a></li>
        <li><a href="encomendas.html">Registro de Encomendas</a></li>
      </ul>
    </nav>
  </aside>
  <main class="main-content">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <h1>Registro de Encomendas</h1>
      <button id="btnNovaEncomenda">Nova Encomenda</button>
    </div>

    <div class="filtros">
      <label for="filtro">Filtrar por:</label>
      <select id="filtro">
        <option value="">--Selecione--</option>
        <option value="identificador">Identificador</option>
        <option value="destinatario">Destinatário</option>
        <option value="unidade">Unidade</option>
      </select>
      <div id="filtros-dinamicos"></div>
    </div>
    <div id="resultados" class="resultados-container"></div>
  </main>

  <!-- Modal de Nova Encomenda -->
  <div class="modal-overlay" id="modalForm">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Nova Encomenda</h2>
        <button id="btnFecharModal">Fechar</button>
      </div>
      <form id="formEncomenda">
        <label>Remetente:
          <input type="text" name="remetente" required />
        </label>
        <label>Destinatário:
          <input type="text" name="destinatario" required />
        </label>
        <label>Tipo:
          <input type="text" name="tipo" required />
        </label>
        <label>Identificador:
          <input type="text" name="identificador" required />
        </label>
        <label>Observação:
          <textarea name="observacao" rows="3"></textarea>
        </label>
        <input type="hidden" name="carimbo" id="dataCadastro" />
        <button type="submit">Enviar</button>
      </form>
      <p id="msgSucesso" style="display:none; color:green; font-weight: bold; margin-top: 1rem;">Encomenda registrada com sucesso!</p>
    </div>
  </div>

  <script>
    const btn = document.getElementById("btnNovaEncomenda");
    const modal = document.getElementById("modalForm");
    const btnFechar = document.getElementById("btnFecharModal");
    const form = document.getElementById("formEncomenda");
    const msg = document.getElementById("msgSucesso");

    btn.addEventListener("click", () => {
      document.getElementById("dataCadastro").value = new Date().toLocaleString("pt-BR");
      modal.style.display = "flex";
    });

    btnFechar.addEventListener("click", () => {
      modal.style.display = "none";
      form.reset();
      msg.style.display = "none";
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();

      const dados = new FormData(form);
      const json = Object.fromEntries(dados.entries());

      try {
        await fetch("https://script.google.com/macros/s/AKfycbw2qWQJV_juYMktVTSiaNy6N80f6JheNFUJ6P9b746cbzh-GIXsf67XTVHBRIpHGoQ/exec", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(json)
        });

        msg.style.display = "block";
        form.reset();
      } catch (err) {
        alert("Erro ao enviar. Verifique sua conexão ou fale com o administrador.");
        console.error(err);
      }
    });
  </script>
  <script src="js/encomendas.js"></script>
</body>
</html>
